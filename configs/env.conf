#================================================================
# env.conf - 项目统一配置文件
# 所有脚本从此文件读取配置参数
# 请根据实际环境修改以下配置
#================================================================

# ============ Ollama 配置 ============
# Ollama 使用的模型（多模态视觉语言模型）
OLLAMA_MODEL="qwen2.5-vl:7b"
# Ollama 监听地址
OLLAMA_HOST="0.0.0.0:11434"

# ============ Dify 配置 ============
# Dify 源码安装路径
DIFY_DIR="/opt/dify"
# Dify 源码分支
DIFY_BRANCH="main"
# Dify API 端口
DIFY_API_PORT="5001"
# Dify Web 前端端口
DIFY_WEB_PORT="3000"

# ============ PostgreSQL 配置 ============
DB_NAME="dify"
DB_USER="dify"
DB_PASSWORD="dify_password_2024"
DB_HOST="localhost"
DB_PORT="5432"

# ============ Redis 配置 ============
REDIS_HOST="localhost"
REDIS_PORT="6379"
REDIS_PASSWORD="dify_redis_2024"

# ============ 安全配置 ============
# Dify 加密密钥（首次部署自动生成，请勿修改）
SECRET_KEY=""

# ============ 服务器网络配置 ============
# 服务器的实际 IP 地址（用于外部访问）
# 请替换为你的服务器实际 IP
SERVER_IP="0.0.0.0"

# ============ 日志配置 ============
LOG_DIR="/var/log/dify"
OLLAMA_LOG="/var/log/ollama.log"
